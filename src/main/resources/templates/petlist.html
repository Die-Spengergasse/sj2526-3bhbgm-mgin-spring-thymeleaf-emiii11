<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pets List</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">

    <table class="table">
        <thead>
        <tr>
            <th>Name</th>
            <th>Rasse</th>
            <th>Birth</th>
            <th>Aktionen</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${pets}">
            <td th:text="${p.name}"></td>
            <td th:text="${p.rasse}"></td>
            <td th:text="${p.birth}"></td>

            <td>
                <a th:href="@{/pets/edit/{id}(id=${p.id})}">Bearbeiten</a>

                <a th:href="@{/pets/delete/{id}(id=${p.id})}">Löschen</a>
            </td>
        </tr>
        </tbody>
    </table>

    <p>
        <a th:href="@{/pets/add}">New Pet</a>
    </p>

</div>
</body>
</html>
